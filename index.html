      (function(){
        function getCookie(name){
          var m = document.cookie.match('(?:^|;)\\s*'+name+'=([^;]*)');
          return m ? m[1] : null;
        }
        function setCookie(name, value, days){
          var d = new Date();
          d.setTime(d.getTime() + days*24*60*60*1000);
          document.cookie = name+'='+value+';expires='+d.toUTCString()+';path=/;SameSite=Lax;Secure';
        }
        function loadGA(){
          if (window.__gaLoaded) return;
          window.__gaLoaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-7EZD0M2S3D';
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          window.gtag = function(){ dataLayer.push(arguments); };
          gtag('js', new Date());
          gtag('config', 'G-7EZD0M2S3D', { anonymize_ip: true });
        }
        window.lessgoConsent = { get: getCookie, set: setCookie, loadGA: loadGA };
        if (getCookie('lessgo-consent') === 'accepted') loadGA();
      })();
    </script>

<div id="form-status" role="status" aria-live="polite"></div>
<script>
(function(){
  var form = document.getElementById('contact-form');
  var status = document.getElementById('form-status');
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    var btn = form.querySelector('button[type=submit]');
    var origLabel = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Saadan...';
    status.textContent = '';
    status.className = '';

    var turnstileEl = form.elements['cf-turnstile-response'];
    var turnstileToken = turnstileEl ? turnstileEl.value : '';
    if (!turnstileToken) {
      status.textContent = 'Palun oota — turvakontroll laeb. Proovi paari sekundi pärast uuesti.';
      status.className = 'form-error';
      btn.disabled = false;
      btn.textContent = origLabel;
      return;
    }

    var data = {
      nimi:           form.nimi.value.trim(),
      ettevote:       form.ettevote.value.trim(),
      email:          form.email.value.trim(),
      paring:         form.paring.value.trim(),
      website:        form.website.value,
      turnstile_token: turnstileToken
    };

    try {
      var res = await fetch(form.action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      var json = await res.json().catch(function(){ return {}; });
      if (!res.ok || json.ok === false) {
        throw new Error(json.message || 'Saatmine ebaõnnestus');
      }
      form.style.display = 'none';
      status.textContent = 'Aitäh! Sinu päring on saadetud. Vastame esimesel võimalusel.';
      status.className   = 'form-success';
    } catch (err) {
      status.textContent = 'Viga: ' + (err.message || 'Tundmatu viga');
      status.className   = 'form-error';
      btn.disabled = false;
      btn.textContent = origLabel;
      // Lähtesta Turnstile uue token'i jaoks
      if (window.turnstile && typeof window.turnstile.reset === 'function') {
        try { window.turnstile.reset(); } catch (e) {}
      }
    }
  });
})();
</script>

      (function(){

        if (!window.lessgoConsent.get('lessgo-consent')) {
