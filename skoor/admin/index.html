<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Skoor Admin — Töölaud</title>
  <script>(function(){try{const t=localStorage.getItem('skoor-theme')||'system';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="timer-banner.css">
  <script src="timer-banner.js" defer></script>
  <link rel="icon" type="image/svg+xml" href="../skoor-favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="vendor/flatpickr/flatpickr.min.css">
  <link rel="stylesheet" href="vendor/flatpickr/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/et.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111827;
      --bg2:      #1f2937;
      --bg3:      #374151;
      --border:   rgba(255,255,255,0.08);
      --text:     #f9fafb;
      --text2:    #9ca3af;
      --text3:    #6b7280;
      --accent:   #10b981;
      --pos:      #10b981;
      --neg:      #ef4444;
      --warn:     #f59e0b;
      --info:     #818cf8;
      --gray:     #9ca3af;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.8; }

    #loading-screen, #denied-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    #denied-screen h2 { color: var(--neg); margin-bottom: 12px; }
    #denied-screen p { color: var(--text2); margin-bottom: 24px; }

    #app { display: none; flex-direction: column; min-height: 100vh; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 36px; height: 36px; border-radius: 50%; }
    .header-title { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .header-title .badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 1px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .nav-link {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      font-size: 13px;
    }
    .nav-link:hover { color: var(--text); border-color: var(--text2); opacity: 1; }
    .nav-link.active { color: var(--text); border-color: var(--accent); background: rgba(16,185,129,0.08); }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      transition: opacity 0.2s, background 0.2s, transform 0.1s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 10px 18px;
      font-weight: 600;
      font-size: 14px;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      padding: 8px 14px;
      font-size: 13px;
    }
    .btn-secondary:hover:not(:disabled) { background: var(--hover-strong); }
    .btn-danger {
      background: var(--neg);
      color: #fff;
      padding: 10px 18px;
      font-weight: 600;
      font-size: 14px;
    }
    .btn-danger:hover:not(:disabled) { opacity: 0.9; }
    .btn-icon {
      background: transparent;
      color: var(--text2);
      padding: 4px 8px;
      font-size: 14px;
    }
    .btn-icon:hover { color: var(--text); }
    .btn-icon.danger:hover { color: var(--neg); }
    .btn-icon.timer-start { color: var(--text2); font-size: 13px; }
    .btn-icon.timer-start:hover { color: var(--accent); }
    .btn-icon.timer-stop  { color: var(--neg); font-size: 13px; animation: row-pulse 1.5s ease-in-out infinite; }
    .btn-icon.postpone    { color: var(--text2); }
    .btn-icon.postpone:hover { color: var(--info); }
    @keyframes row-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .postpone-calendar { display: flex; justify-content: center; }
    .postpone-calendar .flatpickr-calendar.inline { box-shadow: none; margin: 0; }
    /* Peida flatpickr inline-kalender kuni postpone modal on avatud */
    .modal-overlay:not(.visible) .flatpickr-calendar { display: none !important; }

    select, input[type="text"], input[type="email"], input[type="number"],
    input[type="datetime-local"], input[type="month"], input[type="date"], textarea {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }
    label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    main { padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

    /* Banner */
    .red-banner {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: linear-gradient(90deg, rgba(239,68,68,0.20) 0%, rgba(239,68,68,0.08) 100%);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }
    .red-banner.visible { display: flex; }
    .red-banner .icon { font-size: 22px; }
    .red-banner .text { flex: 1; font-size: 14px; }
    .red-banner .text strong { color: var(--neg); }

    /* Period + filter bar */
    .period-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .period-bar > label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
    .period-bar input[type="month"] { width: auto; }
    .period-bar input[type="search"] { width: 220px; }
    .period-bar select { width: auto; min-width: 160px; }
    .period-bar .spacer { flex: 1; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat-tile {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      transition: border-color 120ms ease, background-color 120ms ease, transform 120ms ease;
    }
    .stat-tile:hover { background: var(--bg3); }
    .stat-tile:active { transform: translateY(1px); }
    .stat-tile.active.green  { border-color: var(--pos);  box-shadow: inset 0 0 0 1px var(--pos); }
    .stat-tile.active.yellow { border-color: var(--warn); box-shadow: inset 0 0 0 1px var(--warn); }
    .stat-tile.active.red    { border-color: var(--neg);  box-shadow: inset 0 0 0 1px var(--neg); }
    .stat-tile.active.gray   { border-color: var(--gray); box-shadow: inset 0 0 0 1px var(--gray); }
    .stat-tile .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .stat-tile .dot.green   { background: var(--pos); }
    .stat-tile .dot.yellow  { background: var(--warn); }
    .stat-tile .dot.red     { background: var(--neg); }
    .stat-tile .dot.gray    { background: var(--gray); }
    .stat-tile .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-tile .value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar .spacer { flex: 1; }

    /* Client groups stack */
    .clients-stack { display: flex; flex-direction: column; gap: 14px; }

    .client-group {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }
    .client-group::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 4px;
      z-index: 1;
    }
    .client-group.status-green::before  { background: var(--pos); }
    .client-group.status-yellow::before { background: var(--warn); }
    .client-group.status-red::before    { background: var(--neg); }
    .client-group.status-gray::before   { background: var(--gray); }

    .client-group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px 14px 22px;
      background: var(--hover-faint);
      border-bottom: 1px solid var(--border);
    }
    .client-group-header .status-icon { font-size: 16px; flex-shrink: 0; }
    .client-group-header .client-name {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .client-group-header .progress-text {
      font-size: 12px;
      color: var(--text2);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .client-group-header .progress-bar {
      width: 80px;
      height: 5px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }
    .client-group-header .progress-fill {
      height: 100%;
      background: var(--pos);
      transition: width 0.3s;
    }
    .client-group-header .add-task-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 6px;
    }
    .client-group-header .add-task-btn:hover {
      color: var(--text);
      border-color: var(--text2);
    }

    /* Task table inside group */
    .tasks-scroll { overflow-x: auto; }
    .tasks-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 720px; }
    .tasks-table td { padding: 9px 8px; border-bottom: 1px solid var(--hover-soft); vertical-align: middle; }
    .tasks-table tr:last-child td { border-bottom: none; }
    .tasks-table tr.done td { opacity: 0.55; }
    .tasks-table tr.overdue td.col-due { color: var(--neg); font-weight: 600; }
    .tasks-table tr.row-active-timer td { background: rgba(16,185,129,0.06); }
    .tasks-table .col-due { white-space: nowrap; font-variant-numeric: tabular-nums; width: 95px; padding-left: 22px; }
    .tasks-table .col-priority { width: 100px; white-space: nowrap; }
    .tasks-table .col-status   { width: 124px; white-space: nowrap; }
    .tasks-table .col-actions { white-space: nowrap; text-align: right; width: 1%; }
    .tasks-table .col-name strong { font-weight: 500; }
    .tasks-table .col-name .desc { display: block; font-size: 12px; color: var(--text3); margin-top: 2px; }
    .tasks-table .col-check { width: 36px; text-align: center; padding-left: 16px; }
    .tasks-table tr.row-clickable { cursor: pointer; }
    .tasks-table tr.row-clickable:hover td { background: var(--hover-faint); }

    .check-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--text3);
      border-radius: 5px;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      line-height: 1;
      padding: 0;
    }
    .check-btn:hover { border-color: var(--accent); }
    .check-btn.checked { background: var(--accent); border-color: var(--accent); color: #fff; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .pill.priority-high   { background: rgba(239,68,68,0.15);  color: var(--neg); }
    .pill.priority-medium { background: rgba(245,158,11,0.15); color: var(--warn); }
    .pill.priority-low    { background: rgba(156,163,175,0.15); color: var(--text2); }
    .pill.status-todo     { background: rgba(129,140,248,0.15); color: var(--info); }
    .pill.status-blocked  { background: rgba(245,158,11,0.18); color: var(--warn); }
    .pill.status-done     { background: rgba(16,185,129,0.15); color: var(--accent); }
    .pill.adhoc           { background: rgba(99,102,241,0.12); color: var(--info); border: 1px solid rgba(99,102,241,0.3); }
    .pill.carried         { background: rgba(239,68,68,0.14); color: var(--neg); border: 1px solid rgba(239,68,68,0.35); text-transform: none; letter-spacing: 0; }
    .pill.subtask-pill    { background: var(--hover-mid); color: var(--text2); border: 1px solid var(--border); text-transform: none; letter-spacing: 0; }

    /* Alam-ülesanded (pesastatud ema alla) */
    .tasks-table tr.subtask td.col-check { padding-left: 34px; }
    .subtask-marker { color: var(--text3); margin-right: 4px; }
    .check-btn.locked { border-style: dashed; border-color: var(--text3); color: var(--text3); opacity: 0.55; cursor: not-allowed; }
    .check-btn.locked:hover { border-color: var(--text3); }

    .group-empty {
      padding: 14px 22px;
      color: var(--text2);
      font-size: 13px;
      font-style: italic;
    }
    .group-all-done {
      padding: 14px 22px;
      color: var(--pos);
      font-size: 13px;
      font-weight: 600;
    }

    .empty-msg { text-align: center; color: var(--text2); padding: 60px 20px; }
    .empty-msg .hint { font-size: 13px; color: var(--text3); margin-top: 8px; }

    /* Modal (kopeeritud tasks.html-ist) */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .modal .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
    .modal .field { margin-bottom: 14px; }
    .modal .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-actions.with-delete .btn-danger { margin-right: auto; }
    .modal-error { color: var(--neg); font-size: 13px; margin-top: 8px; }
    .modal-info  { color: var(--text2); font-size: 12px; margin-top: 8px; }

    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      main { padding: 16px; }
      .modal .field-row { grid-template-columns: 1fr; }
      .client-group-header .progress-bar { display: none; }
      .tasks-table { min-width: 0; }
      .tasks-table .col-name { word-break: break-word; }
    }
  </style>
</head>
<body>

<div id="loading-screen" style="display:flex">
  <p style="color: var(--text2)">Laen...</p>
</div>

<div id="denied-screen">
  <h2>Ligipääs keelatud</h2>
  <p>Sul pole admin õigusi.</p>
  <a href="../" class="nav-link">← Skoor avalehele</a>
</div>

<div id="app">
  <header>
    <a href="../" class="header-left" style="color:inherit">
      <svg class="header-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skoor"><path d="M16 72 A38 38 0 1 1 84 72" fill="none" stroke="var(--logo-track)" stroke-width="10" stroke-linecap="round"/><path d="M16 72 A38 38 0 0 1 62 22" fill="none" stroke="#10b981" stroke-width="10" stroke-linecap="round"/><line x1="50" y1="72" x2="68" y2="44" stroke="var(--logo-needle)" stroke-width="5" stroke-linecap="round"/><circle cx="50" cy="72" r="7" fill="#10b981"/></svg>
      <span class="header-title">Skoor<span class="badge">ADMIN</span></span>
    </a>
    <div class="header-right">
      <a href="index.html" class="nav-link active">Töölaud</a>
      <a href="timer.html" class="nav-link">Tööaeg</a>
      <a href="tasks.html" class="nav-link">Ülesanded</a>
      <a href="reports.html" class="nav-link">Arved</a>
      <a href="clients.html" class="nav-link">Kliendid</a>
      <a href="templates.html" class="nav-link">Mallid</a>
      <a href="settings.html" class="nav-link">Seaded</a>
      <a href="../" class="nav-link">← Klientide vaade</a>
      <button class="btn-secondary" id="logout-btn">Logi välja</button>
    </div>
  </header>

  <main>

    <div class="red-banner" id="red-banner">
      <div class="icon">🚨</div>
      <div class="text"><strong id="red-count">—</strong> <span id="red-text">klient vajab tähelepanu.</span></div>
    </div>

    <!-- Period + filter bar -->
    <div class="period-bar">
      <label>Periood:</label>
      <input type="month" id="period-input">
      <button class="btn-secondary" id="prev-period-btn">‹ Eelmine</button>
      <button class="btn-secondary" id="next-period-btn">Järgmine ›</button>
      <button class="btn-secondary" id="this-period-btn">Käesolev kuu</button>
      <input type="text" id="day-input" placeholder="📅 Vali päev" autocomplete="off" style="width:130px">
      <button class="btn-secondary" id="clear-day-btn" style="display:none">Kogu kuu</button>
      <span class="spacer"></span>
      <input type="search" id="client-search-input" placeholder="Otsi klienti…" autocomplete="off">
      <select id="filter-status">
        <option value="">Kõik staatused</option>
        <option value="red">🔴 Punased</option>
        <option value="yellow">🟡 Kollased</option>
        <option value="green">🟢 Rohelised</option>
        <option value="gray">⚪ Blokeeritud</option>
      </select>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-tile" data-status="green"  title="Klikk: filtreeri rohelised (uuesti klikkides tühista)"><div class="dot green"></div><div><div class="label">Roheline</div><div class="value" id="stat-green">—</div></div></div>
      <div class="stat-tile" data-status="yellow" title="Klikk: filtreeri kollased (uuesti klikkides tühista)"><div class="dot yellow"></div><div><div class="label">Kollane</div><div class="value" id="stat-yellow">—</div></div></div>
      <div class="stat-tile" data-status="red"    title="Klikk: filtreeri punased (uuesti klikkides tühista)"><div class="dot red"></div><div><div class="label">Punane</div><div class="value" id="stat-red">—</div></div></div>
      <div class="stat-tile" data-status="gray"   title="Klikk: filtreeri blokeeritud (uuesti klikkides tühista)"><div class="dot gray"></div><div><div class="label">Blokeeritud</div><div class="value" id="stat-gray">—</div></div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="btn-primary" id="new-adhoc-btn">+ Lisa ülesanne</button>
      <button class="btn-secondary" id="generate-btn" title="Loo selle kuu tähtaegade ülesanded mallide-tellimustest (arvestusperiood = eelmine kuu)">⚡ Genereeri instantsid</button>
      <div class="spacer"></div>
      <span class="modal-info" id="period-info">—</span>
    </div>

    <div class="clients-stack" id="clients-stack"></div>

  </main>
</div>

<!-- Edit / new task modal (kopeeritud tasks.html-ist) -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3 id="task-modal-title">Lisa ülesanne</h3>
    <p class="modal-sub" id="task-modal-sub">&nbsp;</p>
    <input type="hidden" id="task-id">
    <input type="hidden" id="task-template-id">

    <div class="field">
      <label for="task-client">Klient *</label>
      <select id="task-client"><option value="">— Vali —</option></select>
    </div>
    <div class="field">
      <label for="task-name">Nimi *</label>
      <input type="text" id="task-name" placeholder="nt 'Aastaaruanne 2025'">
    </div>
    <div class="field">
      <label for="task-description">Kirjeldus</label>
      <textarea id="task-description" rows="2"></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="task-period">Periood *</label>
        <input type="month" id="task-period">
      </div>
      <div class="field">
        <label for="task-due">Tähtaeg *</label>
        <input type="text" id="task-due" placeholder="pp/kk/aaaa" inputmode="numeric" maxlength="10">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="task-priority">Prioriteet *</label>
        <select id="task-priority">
          <option value="high">Kõrge</option>

<script>
const SUPABASE_URL  = 'https://lpehwgpitfowhyiaxrhe.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwZWh3Z3BpdGZvd2h5aWF4cmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzE3NDIsImV4cCI6MjA5MjYwNzc0Mn0.VRAFWMrlyigtPlDVAk9KG2NiFLd1l5aRxwmNrariUfI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Globals ─────────────────────────────────────────────────────
let currentUser = null;
let isAdmin = false;
let clients = [];
let admins = [];
let tasks = [];
let activeTimer = null;
let currentPeriod = todayPeriod();
let currentDay = null;   // kui valitud, filtreerime ühe päeva tähtajad; muidu kogu kuu

// URL params
const urlParams = new URLSearchParams(window.location.search);
const urlPeriod = urlParams.get('period');
if (urlPeriod && /^\d{4}-\d{2}$/.test(urlPeriod)) currentPeriod = urlPeriod;

// ── Helpers ─────────────────────────────────────────────────────
function todayPeriod() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function todayDate() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function shiftPeriod(period, delta) {
  const [y, m] = period.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function lastDayOfMonth(period) {
  const [y, m] = period.split('-').map(Number);
  const d = new Date(y, m, 0).getDate();
  return `${period}-${String(d).padStart(2,'0')}`;
}
function daysBetween(isoDate) {
  const today = new Date(todayDate() + 'T00:00:00');
  const due = new Date(isoDate + 'T00:00:00');
  return Math.round((due - today) / 86400000);
}
function defaultDueDate(period) {
  const [y, m] = period.split('-').map(Number);
  const next = new Date(y, m, 10);
  return `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
}
function parseDDMMYYYY(s) {
  const m = (s || '').trim().match(/^(\d{1,2})\s*[\/.\-]\s*(\d{1,2})\s*[\/.\-]\s*(\d{4})$/);
  if (!m) return null;
  const d = parseInt(m[1], 10);
  const mo = parseInt(m[2], 10);
  const y = parseInt(m[3], 10);
  if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  const iso = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const dt = new Date(iso + 'T00:00:00');
  if (isNaN(dt.getTime()) || dt.getDate() !== d || dt.getMonth()+1 !== mo || dt.getFullYear() !== y) return null;
  return iso;
}
function isoToDDMMYYYY(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function priorityLabel(p) { return { high: 'Kõrge', medium: 'Keskmine', low: 'Madal' }[p] || p; }
function statusLabel(s)   { return { todo: 'Tegemata', blocked: 'Blokeeritud', done: 'Tehtud' }[s] || s; }
function clientName(id)   { const c = clients.find(x => x.id === id); return c?.name || '?'; }
function adminName(userId) {
  if (!userId) return '—';
  const a = admins.find(x => x.user_id === userId);
  return a?.display_name || a?.email?.split('@')[0] || userId.slice(0, 8);
}
function isOverdue(t) { return t.status !== 'done' && t.due_date < todayDate(); }
function periodFromDate(iso) { return iso.slice(0, 7); }
const ET_MONTHS = ['jaan','veebr','märts','apr','mai','juuni','juuli','aug','sept','okt','nov','dets'];
function periodLabel(period) {            // '2026-05' → 'mai 2026'
  const [y, m] = (period || '').split('-').map(Number);
  return (ET_MONTHS[m-1] || period) + ' ' + (y || '');
}
// Avatud ülesanne (todo/blocked) varasemast kuust, mis kandub praegusesse kuu-vaatesse.
// Kandub edasi seni, kuni ülesanne saab tehtud. Päeva-vaates carry-over'it ei ole.
function isCarried(t) {
  return !currentDay && t.status !== 'done' && t.due_date < `${currentPeriod}-01`;
}
function addDaysIso(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function showError(elementId, msg) {
  const el = document.getElementById(elementId);
  if (el) el.textContent = msg || '';
}

// ── Status logic ─────────────────────────────────────────────────
function clientStatus(clientTasks) {
  if (clientTasks.length === 0) return 'green';
  const open = clientTasks.filter(t => t.status !== 'done');
  if (open.length === 0) return 'green';
  const today = todayDate();
  const hasOverdue = open.some(t => t.status !== 'blocked' && t.due_date < today);
  const hasNear    = open.some(t => t.status !== 'blocked' && daysBetween(t.due_date) <= 3 && t.due_date >= today);
  if (hasOverdue || hasNear) return 'red';
  const allBlocked = open.every(t => t.status === 'blocked');
  if (allBlocked) return 'gray';
  return 'yellow';
}
function statusIcon(s) { return { green: '🟢', yellow: '🟡', red: '🔴', gray: '⚪' }[s] || ''; }

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }
  currentUser = session.user;

  const { data: adminRow } = await sb.from('admins').select('user_id').eq('user_id', currentUser.id).maybeSingle();
  isAdmin = !!adminRow;
  if (!isAdmin) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('denied-screen').style.display = 'flex';
    return;
  }

  await loadAdmins();
  await loadClients();
  await loadActiveTimer();
  await loadTasks();
  populateClientDropdowns();

  document.getElementById('period-input').value = currentPeriod;
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  bindUIEvents();

  await SkoorTimerBanner.init({ sb, currentUser, getClientName: clientName });

  sb.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') window.location.href = '../';
  });
}

async function loadAdmins() {
  const { data } = await sb.from('admins').select('user_id, display_name');
  admins = (data || []).map(a => ({
    user_id: a.user_id,
    display_name: a.display_name,
    email: a.user_id === currentUser.id ? currentUser.email : null
  }));
}
async function loadClients() {
  const { data, error } = await sb.from('clients').select('id, name').order('name');
  if (error) { console.error('clients:', error); return; }
  clients = data || [];
}
async function loadTasks() {
  // Päeva-vaade: täpne tähtaeg, ilma carry-over'ita.
  if (currentDay) {
    const { data, error } = await sb.from('task_instances').select('*').eq('due_date', currentDay);
    if (error) { console.error('tasks:', error); tasks = []; render(); return; }
    tasks = data || [];
    render();
    return;
  }

  // Kuu-vaade: selle kuu tähtajad + kõik veel avatud (todo/blocked) tööd varasematest kuudest.
  const periodStart = `${currentPeriod}-01`;
  const [curRes, carriedRes] = await Promise.all([
    sb.from('task_instances').select('*')
      .gte('due_date', periodStart).lte('due_date', lastDayOfMonth(currentPeriod)),
    sb.from('task_instances').select('*')
      .lt('due_date', periodStart).in('status', ['todo', 'blocked'])
  ]);
  if (curRes.error || carriedRes.error) {
    console.error('tasks:', curRes.error || carriedRes.error);
    tasks = []; render(); return;
  }
  tasks = [...(curRes.data || []), ...(carriedRes.data || [])];
  render();
}
async function loadActiveTimer() {
  const { data } = await sb.from('time_entries')
    .select('*')
    .eq('admin_id', currentUser.id)
    .eq('entry_type', 'timer')
    .is('ended_at', null)
    .maybeSingle();
  activeTimer = data || null;
}

function populateClientDropdowns() {
  const opts = clients.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
  const sel = document.getElementById('task-client');
  sel.innerHTML = '<option value="">— Vali —</option>' + opts;
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  // Group tasks by client
  const grouped = {};
  clients.forEach(c => { grouped[c.id] = []; });
  tasks.forEach(t => {
    if (!grouped[t.client_id]) grouped[t.client_id] = [];
    grouped[t.client_id].push(t);
  });

  const groups = clients.map(c => {
    const cTasks = grouped[c.id] || [];
    return { client: c, tasks: cTasks, status: clientStatus(cTasks) };
  });

  // Stats (per client status)
  const counts = { green: 0, yellow: 0, red: 0, gray: 0 };
  groups.forEach(g => counts[g.status]++);
  document.getElementById('stat-green').textContent  = counts.green;
  document.getElementById('stat-yellow').textContent = counts.yellow;
  document.getElementById('stat-red').textContent    = counts.red;
  document.getElementById('stat-gray').textContent   = counts.gray;

  // Sync active state on stat tiles with current filter value
  const activeFilter = document.getElementById('filter-status').value;
  document.querySelectorAll('.stat-tile').forEach(tile => {
    const s = tile.dataset.status;
    tile.classList.toggle('active', !!activeFilter && activeFilter === s);
    tile.classList.toggle('green',  s === 'green');
    tile.classList.toggle('yellow', s === 'yellow');
    tile.classList.toggle('red',    s === 'red');
    tile.classList.toggle('gray',   s === 'gray');
  });

  // Banner
  const banner = document.getElementById('red-banner');
  if (counts.red > 0) {
    banner.classList.add('visible');
    document.getElementById('red-count').textContent = counts.red;
    document.getElementById('red-text').textContent = counts.red === 1
      ? 'klient vajab tähelepanu (üle tähtaja või tähtaeg ≤ 3 päeva).'
      : 'klienti vajavad tähelepanu (üle tähtaja või tähtaeg ≤ 3 päeva).';
  } else {
    banner.classList.remove('visible');
  }

  // Period info — "tehtud" arvestab selle kuu töid; varasemast kuust kandunud tööd näidatakse eraldi.
  const currentTasks = tasks.filter(t => !isCarried(t));
  const carriedCount = tasks.length - currentTasks.length;
  const totalTasks   = currentTasks.length;
  const doneTasks    = currentTasks.filter(t => t.status === 'done').length;
  const baseInfo     = totalTasks === 0 ? '' : `${doneTasks} / ${totalTasks} tehtud`;
  document.getElementById('period-info').textContent =
    carriedCount > 0
      ? `${baseInfo}${baseInfo ? ' · ' : ''}${carriedCount} üle tähtaja eelmistest kuudest`
      : baseInfo;

  // Filter
  const fStatus = document.getElementById('filter-status').value;
  const fSearch = (document.getElementById('client-search-input').value || '').trim().toLowerCase();
  let filteredGroups = groups;
  if (fStatus) filteredGroups = groups.filter(g => g.status === fStatus);
  if (fSearch) filteredGroups = filteredGroups.filter(g => g.client.name.toLowerCase().includes(fSearch));

  // Hide clients with 0 tasks (unless filter is set so user explicitly asked)
  if (!fStatus && !fSearch) filteredGroups = filteredGroups.filter(g => g.tasks.length > 0);

  // Sort: red → yellow → gray → green; tie-break by name
  const order = { red: 0, yellow: 1, gray: 2, green: 3 };
  filteredGroups.sort((a, b) => {
    if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
    return a.client.name.localeCompare(b.client.name);
  });

  const stack = document.getElementById('clients-stack');
  if (filteredGroups.length === 0) {
    stack.innerHTML = `<div class="empty-msg">
      ${tasks.length === 0
        ? (currentDay ? 'Sel päeval pole ühtegi tähtaega.' : 'Selles kuus pole ühtegi tähtaega.')
        : 'Ükski klient ei vasta filtrile.'}
      <div class="hint">Vajuta "+ Lisa ülesanne" või "⚡ Genereeri instantsid".</div>
    </div>`;
    return;
  }

  stack.innerHTML = filteredGroups.map(renderGroup).join('');
  bindRowEvents();
}

function renderGroup({ client, tasks: cTasks, status }) {
  const currentTasks = cTasks.filter(t => !isCarried(t));   // edenemine = selle kuu tööd
  const total = currentTasks.length;
  const done  = currentTasks.filter(t => t.status === 'done').length;
  const pct   = total === 0 ? 0 : Math.round((done / total) * 100);

  // Sort tasks within group: status (todo→blocked→done), then priority, then due_date
  const priorityOrder = { high: 0, medium: 1, low: 2 };
  const statusOrder   = { todo: 0, blocked: 1, done: 2 };
  const sortFn = (a, b) => {
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    if (priorityOrder[a.priority] !== priorityOrder[b.priority]) return priorityOrder[a.priority] - priorityOrder[b.priority];
    return a.due_date.localeCompare(b.due_date);
  };

  // Pesasta alam-ülesanded (parent_instance_id) ema alla; orphan-lapsed jäävad ülemtasandile
  const byId = new Map(cTasks.map(t => [t.id, t]));
  const kidsByParent = new Map();
  const topLevel = [];
  cTasks.forEach(t => {
    if (t.parent_instance_id && byId.has(t.parent_instance_id)) {
      if (!kidsByParent.has(t.parent_instance_id)) kidsByParent.set(t.parent_instance_id, []);
      kidsByParent.get(t.parent_instance_id).push(t);
    } else {
      topLevel.push(t);
    }
  });

  const rows = topLevel.slice().sort(sortFn).map(parent => {
    const kids = (kidsByParent.get(parent.id) || []).slice().sort(sortFn);
    const openKids = kids.filter(k => k.status !== 'done').length;
    return renderTaskRow(parent, false, openKids) + kids.map(k => renderTaskRow(k, true, 0)).join('');
  }).join('');

  let body;
  if (cTasks.length === 0) {
    body = `<div class="group-empty">Selle kuu jaoks pole ülesandeid.</div>`;
  } else {
    body = `<div class="tasks-scroll"><table class="tasks-table"><tbody>${rows}</tbody></table></div>`;
  }

  return `
    <section class="client-group status-${status}">
      <div class="client-group-header">
        <span class="status-icon">${statusIcon(status)}</span>
        <span class="client-name">${escapeHtml(client.name)}</span>
        ${total > 0 ? `
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${done} / ${total} tehtud</span>
        ` : ''}
        <button class="add-task-btn" data-add-client="${client.id}" title="Lisa ülesanne">+ Lisa</button>
      </div>
      ${body}
    </section>
  `;
}

// Üks ülesande rida. isSub = alam-ülesanne (taane); openKids = mitu alam-ülesannet tegemata (ema lukus).
function renderTaskRow(t, isSub, openKids) {
  const overdue = isOverdue(t);
  const isDone = t.status === 'done';
  const isAdHoc = !t.template_id;
  const isRunningHere = activeTimer && activeTimer.task_id === t.id;
  const locked = !isDone && openKids > 0;
  const timerBtn = isRunningHere
    ? `<button class="btn-icon timer-stop" data-timer-stop="${t.id}" title="Peata timer">⏹</button>`
    : `<button class="btn-icon timer-start" data-timer-start="${t.id}" title="Käivita timer">▶</button>`;
  const checkTitle = locked ? 'Lõpeta esmalt alam-ülesanded' : (isDone ? 'Märgi tegemata' : 'Märgi tehtud');

  return `
    <tr class="${isDone ? 'done' : ''} ${overdue ? 'overdue' : ''} ${isRunningHere ? 'row-active-timer' : ''} ${isSub ? 'subtask' : ''} row-clickable" data-id="${t.id}">
      <td class="col-check">
        <button class="check-btn ${isDone ? 'checked' : ''} ${locked ? 'locked' : ''}" data-toggle="${t.id}" title="${checkTitle}">
          ${isDone ? '✓' : ''}
        </button>
      </td>
      <td class="col-due">${fmtDate(t.due_date)}</td>
      <td class="col-name">
        <strong>${isSub ? '<span class="subtask-marker">↳</span>' : ''}${escapeHtml(t.name)}</strong>
        ${t.description ? `<span class="desc">${escapeHtml(t.description)}</span>` : ''}
        ${t.notes ? `<span class="desc" style="color:var(--warn)">📌 ${escapeHtml(t.notes)}</span>` : ''}
        ${isAdHoc ? '<span class="pill adhoc" style="margin-top:4px">ad-hoc</span>' : ''}
        ${isCarried(t) ? `<span class="pill carried" style="margin-top:4px">⚠ ${escapeHtml(periodLabel(t.period))} · üle tähtaja</span>` : ''}
      </td>
      <td class="col-priority"><span class="pill priority-${t.priority}">${priorityLabel(t.priority)}</span></td>
      <td class="col-status"><span class="pill status-${t.status}">${statusLabel(t.status)}</span></td>
      <td class="col-actions">
        <button class="btn-icon" data-edit="${t.id}" title="Muuda">✏</button>
        <button class="btn-icon postpone" data-postpone="${t.id}" title="Lükka edasi">📅</button>
        ${timerBtn}
      </td>
    </tr>
  `;
}

function bindRowEvents() {
  const root = document.getElementById('clients-stack');
  root.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); toggleDone(btn.dataset.toggle); });
  });
  root.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(btn.dataset.edit); });
  });
  root.querySelectorAll('[data-postpone]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openPostponeModal(btn.dataset.postpone); });
  });
  root.querySelectorAll('[data-timer-start]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); startTimerForTask(btn.dataset.timerStart); });
  });
  root.querySelectorAll('[data-timer-stop]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); stopTaskTimer(btn.dataset.timerStop); });
  });
  root.querySelectorAll('[data-add-client]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openNewModalForClient(btn.dataset.addClient); });
  });
  root.querySelectorAll('tr.row-clickable').forEach(row => {
    row.addEventListener('click', () => openEditModal(row.dataset.id));
  });
}

// ── Toggle done ─────────────────────────────────────────────────
async function toggleDone(taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  const newStatus = t.status === 'done' ? 'todo' : 'done';

  // Range sõltuvus: emaülesannet ei saa tehtuks märkida enne alam-ülesandeid
  if (newStatus === 'done') {
    const openKids = tasks.filter(k => k.parent_instance_id === taskId && k.status !== 'done');
    if (openKids.length) {
      alert(`„${t.name}" ei saa veel tehtuks märkida.\n\nEsmalt lõpeta alam-ülesanne(d):\n• ${openKids.map(k => k.name).join('\n• ')}`);
      return;
    }
  }

  const update = {
    status: newStatus,
    completed_at: newStatus === 'done' ? new Date().toISOString() : null,
    completed_by: newStatus === 'done' ? currentUser.id : null,
    edited_at: new Date().toISOString(),
    edited_by: currentUser.id
  };
  const { error } = await sb.from('task_instances').update(update).eq('id', taskId);
  if (error) { alert('Viga: ' + error.message); return; }
  await loadTasks();
}

// ── Timer shortcut ──────────────────────────────────────────────
async function startTimerForTask(taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  if (activeTimer && activeTimer.task_id === taskId) return;

  if (activeTimer) {
    const { error: stopErr } = await sb.from('time_entries').update({
      ended_at: new Date().toISOString(),
      edited_at: new Date().toISOString(),
      edited_by: currentUser.id
    }).eq('id', activeTimer.id);
    if (stopErr) { alert('Eelmise timeri peatamisel viga: ' + stopErr.message); return; }
    activeTimer = null;
  }

  const nowIso = new Date().toISOString();
  const { data, error } = await sb.from('time_entries').insert({
    admin_id: currentUser.id,
    client_id: t.client_id,
    task_id: t.id,
    entry_type: 'timer',
    started_at: nowIso,
    duration_minutes: 0,
    period: nowIso.slice(0, 7),
    comment: t.name,
    created_by: currentUser.id
  }).select().single();

  if (error) {
    if (error.code === '23505') {
      await loadActiveTimer();
      render();
      alert('Sul juba jookseb timer (võib-olla teises tabis).');
    } else {
      alert('Timeri käivitamisel viga: ' + error.message);
    }
    return;
  }
  activeTimer = data;
  render();
  if (window.SkoorTimerBanner) SkoorTimerBanner.refresh();
}

async function stopTaskTimer(taskId) {
  if (!activeTimer || activeTimer.task_id !== taskId) return;
  const { error } = await sb.from('time_entries').update({
    ended_at: new Date().toISOString(),
    edited_at: new Date().toISOString(),
    edited_by: currentUser.id
  }).eq('id', activeTimer.id);
  if (error) { alert('Timeri peatamisel viga: ' + error.message); return; }
  activeTimer = null;
  render();
  if (window.SkoorTimerBanner) SkoorTimerBanner.refresh();
}

// ── Postpone ────────────────────────────────────────────────────
let postponeFp = null; // flatpickr instance (inline kalender)

function dateToIso(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function openPostponeModal(taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  document.getElementById('postpone-task-id').value = t.id;
  document.getElementById('postpone-modal-sub').textContent = `${clientName(t.client_id)} — ${t.name}`;
  document.getElementById('postpone-current').textContent = fmtDate(t.due_date);
  showModal('postpone-modal');
  if (!postponeFp) {
    postponeFp = flatpickr('#postpone-date', {
      locale: 'et',
      dateFormat: 'Y-m-d',
      inline: true,
      appendTo: document.getElementById('postpone-calendar'),
      onChange: updatePostponePeriodHint,
    });
  }
  postponeFp.setDate(t.due_date, false);
  document.getElementById('postpone-period-hint').innerHTML = '&nbsp;';
  showError('postpone-modal-error', '');
}

function updatePostponePeriodHint() {
  const sel = postponeFp && postponeFp.selectedDates[0];
  const hint = document.getElementById('postpone-period-hint');
  if (!sel) { hint.innerHTML = '&nbsp;'; return; }
  const iso = dateToIso(sel);
  const newPeriod = periodFromDate(iso);
  const t = tasks.find(x => x.id === document.getElementById('postpone-task-id').value);
  if (t && newPeriod !== t.period) {
    hint.textContent = `Ülesanne liigub perioodi ${newPeriod}`;
    hint.style.color = 'var(--warn)';
  } else {
    hint.innerHTML = '&nbsp;';
    hint.style.color = '';
  }
}

async function postponeQuick(days) {
  const taskId = document.getElementById('postpone-task-id').value;
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  await applyPostpone(taskId, addDaysIso(t.due_date, days));
}

async function postponeFromInput() {
  const taskId = document.getElementById('postpone-task-id').value;
  const sel = postponeFp && postponeFp.selectedDates[0];
  if (!sel) { showError('postpone-modal-error', 'Vali kuupäev kalendrist.'); return; }
  await applyPostpone(taskId, dateToIso(sel));
}

async function applyPostpone(taskId, newDueIso) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  const newPeriod = periodFromDate(newDueIso);
  const btn = document.getElementById('postpone-save-btn');
  btn.disabled = true;
  const { error } = await sb.from('task_instances').update({
    due_date: newDueIso,
    period: newPeriod,
    edited_at: new Date().toISOString(),
    edited_by: currentUser.id
  }).eq('id', taskId);
  btn.disabled = false;
  if (error) {
    if (error.code === '23505') {
      showError('postpone-modal-error',
        `Selle malli ülesanne on perioodis ${newPeriod} juba olemas. Vali teine kuupäev või kustuta olemasolev.`);
    } else {
      showError('postpone-modal-error', 'Viga: ' + error.message);
    }
    return;
  }
  hideModal('postpone-modal');
  await loadTasks();
}

// ── New / Edit modal ────────────────────────────────────────────
function openNewModal() { openNewModalForClient(''); }

function openNewModalForClient(clientId) {
  document.getElementById('task-modal-title').textContent = 'Lisa ülesanne';
  document.getElementById('task-modal-sub').textContent = '';
  document.getElementById('task-id').value = '';
  document.getElementById('task-template-id').value = '';
  document.getElementById('task-client').value = clientId || '';
  document.getElementById('task-name').value = '';
  document.getElementById('task-description').value = '';
  document.getElementById('task-period').value = currentPeriod;
  document.getElementById('task-due').value = isoToDDMMYYYY(currentDay || `${currentPeriod}-10`);
  document.getElementById('task-priority').value = 'medium';
  document.getElementById('task-status').value = 'todo';
  document.getElementById('task-notes').value = '';
  document.getElementById('task-delete-btn').style.display = 'none';
  showError('task-modal-error', '');
  showModal('task-modal');
}

function openEditModal(taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  const isTemplate = !!t.template_id;
  document.getElementById('task-modal-title').textContent = 'Muuda ülesannet';
  document.getElementById('task-modal-sub').textContent = isTemplate
    ? 'Mallist genereeritud ülesanne — kustutamine kustutab ainult selle kuu instantsi.'
    : 'Ad-hoc ülesanne.';
  document.getElementById('task-id').value = t.id;
  document.getElementById('task-template-id').value = t.template_id || '';
  document.getElementById('task-client').value = t.client_id;
  document.getElementById('task-name').value = t.name;
  document.getElementById('task-description').value = t.description || '';
  document.getElementById('task-period').value = t.period;
  document.getElementById('task-due').value = isoToDDMMYYYY(t.due_date);
  document.getElementById('task-priority').value = t.priority;
  document.getElementById('task-status').value = t.status;
  document.getElementById('task-notes').value = t.notes || '';
  document.getElementById('task-delete-btn').style.display = '';
  showError('task-modal-error', '');
  showModal('task-modal');
}

async function saveTask() {
  const id          = document.getElementById('task-id').value;
  const templateId  = document.getElementById('task-template-id').value || null;
  const clientId    = document.getElementById('task-client').value;
  const name        = document.getElementById('task-name').value.trim();
  const description = document.getElementById('task-description').value.trim() || null;
  const period      = document.getElementById('task-period').value;
  const dueRaw      = document.getElementById('task-due').value;
  const priority    = document.getElementById('task-priority').value;
  const status      = document.getElementById('task-status').value;
  const notes       = document.getElementById('task-notes').value.trim() || null;

  if (!clientId) return showError('task-modal-error', 'Vali klient.');
  if (!name)     return showError('task-modal-error', 'Sisesta ülesande nimi.');
  if (!period)   return showError('task-modal-error', 'Sisesta periood.');
  if (!dueRaw)   return showError('task-modal-error', 'Sisesta tähtaeg.');
  if (!/^\d{4}-\d{2}$/.test(period)) return showError('task-modal-error', 'Vigane periood.');

  const dueDate = parseDDMMYYYY(dueRaw);
  if (!dueDate) return showError('task-modal-error', 'Vigane tähtaeg. Formaat: pp/kk/aaaa.');

  const btn = document.getElementById('task-save-btn');
  btn.disabled = true;

  let prevStatus = null;
  if (id) { const prev = tasks.find(x => x.id === id); prevStatus = prev?.status; }

  const payload = {
    client_id: clientId,
    name: name,
    description: description,
    period: period,
    due_date: dueDate,
    priority: priority,
    status: status,
    notes: notes,
    edited_at: new Date().toISOString(),
    edited_by: currentUser.id
  };
  if (status === 'done' && prevStatus !== 'done') {
    payload.completed_at = new Date().toISOString();
    payload.completed_by = currentUser.id;
  } else if (status !== 'done' && prevStatus === 'done') {
    payload.completed_at = null;
    payload.completed_by = null;
  } else if (!id && status === 'done') {
    payload.completed_at = new Date().toISOString();
    payload.completed_by = currentUser.id;
  }

  let result;
  if (id) {
    result = await sb.from('task_instances').update(payload).eq('id', id);
  } else {
    payload.template_id = templateId;
    result = await sb.from('task_instances').insert(payload);
  }
  btn.disabled = false;

  if (result.error) {
    if (result.error.code === '23505') {
      return showError('task-modal-error', 'Selle malli ülesanne on selles kuus juba olemas.');
    }
    return showError('task-modal-error', 'Viga salvestamisel: ' + result.error.message);
  }
  hideModal('task-modal');
  await loadTasks();
}

async function deleteTask() {
  const id = document.getElementById('task-id').value;
  if (!id) return;
  if (!confirm('Kustutame ülesande?')) return;

  const btn = document.getElementById('task-delete-btn');
  btn.disabled = true;
  const { error } = await sb.from('task_instances').delete().eq('id', id);
  btn.disabled = false;
  if (error) return showError('task-modal-error', 'Viga: ' + error.message);
  hideModal('task-modal');
  await loadTasks();
}

// ── Generate instances ──────────────────────────────────────────
async function generateInstances() {
  // Töölaud näitab tähtaegu kuus currentPeriod. Mallide tähtaeg = arvestusperioodile
  // järgnev kuu, seega selle kuu tähtaegade tekitamiseks genereerime perioodi kuu−1.
  const acctPeriod = shiftPeriod(currentPeriod, -1);
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  const { data, error } = await sb.rpc('generate_task_instances_for_period', { p_period: acctPeriod });
  btn.disabled = false;
  if (error) { alert('Viga: ' + error.message); return; }
  const result = Array.isArray(data) ? data[0] : data;
  alert(`Arvestusperiood ${acctPeriod} → tähtajad kuus ${currentPeriod}.\nLoodud: ${result?.created ?? 0}\nVahele jäetud: ${result?.skipped ?? 0}`);
  await loadTasks();
}

// ── Päevafilter ─────────────────────────────────────────────────
let dayFp = null;  // flatpickr instance (päevavalija)
function clearDayFilter() {
  currentDay = null;
  if (dayFp) dayFp.clear();
  const btn = document.getElementById('clear-day-btn');
  if (btn) btn.style.display = 'none';
}

// ── Modals ──────────────────────────────────────────────────────
function showModal(id) { document.getElementById(id).classList.add('visible'); }
function hideModal(id) { document.getElementById(id).classList.remove('visible'); }

// ── UI events ───────────────────────────────────────────────────
function bindUIEvents() {
  document.getElementById('logout-btn').addEventListener('click', () => sb.auth.signOut());

  document.getElementById('new-adhoc-btn').addEventListener('click', openNewModal);
  document.getElementById('generate-btn').addEventListener('click', generateInstances);

  document.getElementById('task-save-btn').addEventListener('click', saveTask);
  document.getElementById('task-delete-btn').addEventListener('click', deleteTask);

  document.getElementById('postpone-plus1-btn').addEventListener('click', () => postponeQuick(1));
  document.getElementById('postpone-save-btn').addEventListener('click', postponeFromInput);

  flatpickr('#task-due', { locale: 'et', dateFormat: 'd/m/Y', allowInput: true, disableMobile: true });
  // Postpone inline kalender — lazy init openPostponeModal()'is, et see ei renderdaks DOMis enne kui modal avaneb

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('visible'); });
  });
  document.querySelectorAll('[data-dismiss]').forEach(btn => {
    btn.addEventListener('click', () => hideModal(btn.dataset.dismiss));
  });

  document.getElementById('period-input').addEventListener('change', async (e) => {
    currentPeriod = e.target.value; clearDayFilter(false); await loadTasks();
  });
  document.getElementById('prev-period-btn').addEventListener('click', async () => {
    currentPeriod = shiftPeriod(currentPeriod, -1);
    document.getElementById('period-input').value = currentPeriod; clearDayFilter(false); await loadTasks();
  });
  document.getElementById('next-period-btn').addEventListener('click', async () => {
    currentPeriod = shiftPeriod(currentPeriod, +1);
    document.getElementById('period-input').value = currentPeriod; clearDayFilter(false); await loadTasks();
  });
  document.getElementById('this-period-btn').addEventListener('click', async () => {
    currentPeriod = todayPeriod();
    document.getElementById('period-input').value = currentPeriod; clearDayFilter(false); await loadTasks();
  });

  // Päevavalija (flatpickr) — vali konkreetne tähtajapäev kuu sees
  dayFp = flatpickr('#day-input', {
    locale: 'et', dateFormat: 'd/m/Y', disableMobile: true,
    onChange: async (dates) => {
      if (!dates[0]) return;
      currentDay = dateToIso(dates[0]);
      currentPeriod = periodFromDate(currentDay);
      document.getElementById('period-input').value = currentPeriod;
      document.getElementById('clear-day-btn').style.display = '';
      await loadTasks();
    }
  });
  document.getElementById('clear-day-btn').addEventListener('click', async () => {
    clearDayFilter(true); await loadTasks();
  });
  document.getElementById('filter-status').addEventListener('change', render);
  document.getElementById('client-search-input').addEventListener('input', render);

  // Stat tiles act as filter shortcuts (toggle: re-click same tile clears filter)
  document.querySelectorAll('.stat-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const filterEl = document.getElementById('filter-status');
      const target = tile.dataset.status;
      filterEl.value = (filterEl.value === target) ? '' : target;
      render();
    });
  });
}

init();
</script>
